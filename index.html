<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionGuide AI</title>
    <style>
        /* Base Layout & Centering */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* 1. Dark Gradient Background Layer */
        .background-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: -1;
        }

        /* 2. Glassmorphism Main Container */
        .glass-container {
            background: rgba(255, 255, 255, 0.05); /* Very transparent white */
            backdrop-filter: blur(20px); /* Frosted glass effect */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
            width: 450px;
        }

        h1 {
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* 3. Grid Layout for Tiles */
        .tile-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        /* 4. Glass Tiles (Buttons) */
        .tile {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tile h2 {
            margin: 0;
            font-size: 1rem;
            pointer-events: none;
        }

        .tile p {
            margin: 5px 0 0;
            font-size: 0.75rem;
            opacity: 0.7;
            pointer-events: none;
        }

        /* Hover & Interaction */
        .tile:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .status-tile {
            cursor: default;
        }

        /* 5. Floating Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .float-1 { animation: float 4s ease-in-out infinite; }
        .float-2 { animation: float 5s ease-in-out infinite; }
        .float-3 { animation: float 6s ease-in-out infinite; }

    </style>
</head>
<body>
    
    <div class="background-gradient"></div>
    
    <main class="glass-container">
        <h1 aria-label="Vision Guide AI">VisionGuide AI</h1>
        
        <div class="tile-grid">
            <button onclick="initApp()" class="tile float-1" id="setup-btn">
                <h2>Initialize</h2>
                <p>Bluetooth & Location</p>
            </button>

            <button onclick="setVoice('male')" class="tile float-2">
                <h2>Male AI</h2>
                <p>Select Voice</p>
            </button>

            <button onclick="setVoice('female')" class="tile float-3">
                <h2>Female AI</h2>
                <p>Select Voice</p>
            </button>
            
            <div class="tile status-tile float-1" id="status">
                <h2>Status</h2>
                <p id="status-text">Waiting for Setup...</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
